<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编程语言学习之路</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: linear-gradient(160deg, #0f0c29 0%, #1a1a3e 40%, #24243e 100%);
    color: #e0e0e0;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }

  .header {
    text-align: center;
    padding: 2rem 0 3rem;
  }

  .header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
  }

  .header p {
    font-size: 1.1rem;
    color: #999;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.8;
  }

  .timeline {
    position: relative;
    max-width: 820px;
    margin: 0 auto;
    padding: 1rem 0;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, #f7971e, #a18cd1, #4facfe, #00d2ff, #43e97b);
    border-radius: 2px;
  }

  .year-block {
    display: flex;
    align-items: flex-start;
    margin-bottom: 2.5rem;
    position: relative;
  }

  .year-block:nth-child(odd) .content { text-align: right; padding-right: 3.5rem; }
  .year-block:nth-child(even) .content { text-align: left; padding-left: 3.5rem; }
  .year-block:nth-child(even) { flex-direction: row-reverse; justify-content: flex-start; }

  .content { width: 50%; }

  .dot {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.9);
    z-index: 1;
    top: 6px;
  }

  .year-block:nth-child(1) .dot { background: #f7971e; box-shadow: 0 0 12px #f7971e88; }
  .year-block:nth-child(2) .dot { background: #a18cd1; box-shadow: 0 0 12px #a18cd188; }
  .year-block:nth-child(3) .dot { background: #4facfe; box-shadow: 0 0 12px #4facfe88; }
  .year-block:nth-child(4) .dot { background: #00d2ff; box-shadow: 0 0 12px #00d2ff88; }
  .year-block:nth-child(5) .dot { background: #43e97b; box-shadow: 0 0 12px #43e97b88; }

  .year-label {
    font-size: 1.7rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    letter-spacing: 1px;
  }

  .year-block:nth-child(1) .year-label { color: #f7971e; }
  .year-block:nth-child(2) .year-label { color: #a18cd1; }
  .year-block:nth-child(3) .year-label { color: #4facfe; }
  .year-block:nth-child(4) .year-label { color: #00d2ff; }
  .year-block:nth-child(5) .year-label { color: #43e97b; }

  .lang-tags {
    display: inline-flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }

  .year-block:nth-child(odd) .lang-tags { justify-content: flex-end; }
  .year-block:nth-child(even) .lang-tags { justify-content: flex-start; }

  .lang-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 0.45rem 1rem;
    font-size: 0.95rem;
    transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    cursor: default;
  }

  .lang-tag:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.14);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .lang-tag i {
    font-size: 1.3rem;
  }

  .comment {
    font-size: 0.85rem;
    color: #777;
    margin-top: 0.5rem;
    font-style: italic;
  }


  /* animated entrance */
  .year-block {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.6s forwards;
  }
  .year-block:nth-child(1) { animation-delay: 0.1s; }
  .year-block:nth-child(2) { animation-delay: 0.25s; }
  .year-block:nth-child(3) { animation-delay: 0.4s; }
  .year-block:nth-child(4) { animation-delay: 0.55s; }
  .year-block:nth-child(5) { animation-delay: 0.7s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .timeline::before { left: 20px; }
    .year-block,
    .year-block:nth-child(even) {
      flex-direction: row !important;
      justify-content: flex-start !important;
    }
    .content,
    .year-block:nth-child(odd) .content,
    .year-block:nth-child(even) .content {
      width: calc(100% - 44px) !important;
      text-align: left !important;
      padding-left: 44px !important;
      padding-right: 0 !important;
    }
    .lang-tags,
    .year-block:nth-child(odd) .lang-tags,
    .year-block:nth-child(even) .lang-tags {
      justify-content: flex-start !important;
    }
    .dot { left: 20px !important; }
    .header h1 { font-size: 1.8rem; }
    .footer { padding: 2rem 1.2rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>编程语言学习之路</h1>
  <p>每一门语言都是一块基石<br>掌握编程不是百米冲刺，而是一场马拉松</p>
</div>

<div class="timeline">

  <!-- 2011 -->
  <div class="year-block">
    <div class="content">
      <div class="year-label">2011</div>
      <div class="lang-tags">
        <span class="lang-tag"><i class="devicon-c-plain"></i> C</span>
      </div>
      <div class="comment">一切从这里开始</div>
    </div>
    <div class="dot"></div>
  </div>

  <!-- 2012 -->
  <div class="year-block">
    <div class="dot"></div>
    <div class="content">
      <div class="year-label">2012</div>
      <div class="lang-tags">
        <span class="lang-tag"><i class="devicon-csharp-plain"></i> C#</span>
        <span class="lang-tag"><i class="devicon-cplusplus-plain"></i> C++</span>
        <span class="lang-tag"><i class="devicon-java-plain"></i> Java</span>
      </div>
      <div class="comment">面向对象的世界</div>
    </div>
  </div>

  <!-- 2013 -->
  <div class="year-block">
    <div class="content">
      <div class="year-label">2013</div>
      <div class="lang-tags">
        <span class="lang-tag"><i class="devicon-php-plain"></i> PHP</span>
        <span class="lang-tag"><i class="devicon-python-plain"></i> Python</span>
      </div>
      <div class="comment">Web 与脚本的世界</div>
    </div>
    <div class="dot"></div>
  </div>

  <!-- 2014 -->
  <div class="year-block">
    <div class="dot"></div>
    <div class="content">
      <div class="year-label">2014</div>
      <div class="lang-tags">
        <span class="lang-tag"><i class="devicon-scala-plain"></i> Scala</span>
        <span class="lang-tag"><i class="devicon-haskell-plain"></i> Haskell</span>
      </div>
      <div class="comment">函数式编程的启蒙</div>
    </div>
  </div>

  <!-- 2015 -->
  <div class="year-block">
    <div class="content">
      <div class="year-label">2015</div>
      <div class="lang-tags">
        <span class="lang-tag"><i class="devicon-rust-original"></i> Rust</span>
        <span class="lang-tag"><i class="devicon-ruby-plain"></i> Ruby</span>
      </div>
      <div class="comment">安全与优雅的追求</div>
    </div>
    <div class="dot"></div>
  </div>

</div>


</body>
</html>
